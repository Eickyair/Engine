services:
  mongodb:
    image: mongo:7.0.17
    container_name: ${COMPOSE_PROJECT_NAME}_mongo
    command:
      - mongod
      - --auth
      - --bind_ip_all
      - --wiredTigerCacheSizeGB
      - ${MONGO_WIREDTIGER_CACHE_GB:-0.5}
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
      MONGO_APP_DATABASE: ${MONGO_APP_DATABASE}
      MONGO_APP_USER: ${MONGO_APP_USER}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_ROOT_USER}\" --password \"$${MONGO_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand({ ping: 1 }).ok\" | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init:/docker-entrypoint-initdb.d:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: traffic-engine:local
    container_name: ${COMPOSE_PROJECT_NAME}_api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Inside the compose network, reach mongo via the service alias.
      # This overrides MONGODB_URI from .env (which points at 127.0.0.1 for dev).
      MONGODB_URI: "mongodb://${MONGO_APP_USER}:${MONGO_APP_PASSWORD}@mongodb:27017/${MONGO_APP_DATABASE}?authSource=${MONGO_APP_DATABASE}&authMechanism=SCRAM-SHA-256&directConnection=true&maxPoolSize=30&minPoolSize=1&maxIdleTimeMS=60000&connectTimeoutMS=5000&serverSelectionTimeoutMS=5000&socketTimeoutMS=10000&waitQueueTimeoutMS=5000"
      UVICORN_WORKERS: "${UVICORN_WORKERS:-2}"
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongo_data: